worker_processes auto;

events { 
    worker_connections 1024; 
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting based on Client IP (10 requests per second)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ─── Load Balancing Upstream Blocks ──────────────────────────────────────────
    
    # NestJS Gateway (Sticky sessions enabled via ip_hash)
    upstream nest_api_servers {
        ip_hash;
        server nest-api:3000;
    }

    # FastAPI AI Engine
    upstream fastapi_ai_servers {
        server fastapi-ai:10000;
    }

    # Node Utility Microservice
    upstream node_services_servers {
        server node-services:3001;
    }

    # Next.js Frontend App
    upstream frontend_servers {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Limit body size to protect against large payloads / buffer overflow
        client_max_body_size 15m;

        # NextAuth API routes (must go to Next.js frontend)
        location /api/auth/ {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # NestJS API Gateway
        location /api/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://nest_api_servers/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # WebSocket Socket.IO Gateway on NestJS (Sticky sessions)
        location /socket.io/ {
            proxy_pass http://nest_api_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # FastAPI AI Engine
        location /ai/ {
            rewrite ^/ai/(.*)$ /$1 break;
            proxy_pass http://fastapi_ai_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Support SSE streaming
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # Node Services Express Utility
        location /utils/ {
            proxy_pass http://node_services_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js Frontend
        location / {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check
        location /health {
            access_log off;
            return 200 '{"status": "online", "message": "API is live", "service": "Nginx Gateway"}';
            add_header Content-Type application/json;
        }
    }
}
