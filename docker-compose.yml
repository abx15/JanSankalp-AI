version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION DOCKER COMPOSE - Complete JanSankalp AI 4-Tier Microservice Stack
# Run with: docker compose up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── 1. Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jansankalp-frontend
    restart: unless-stopped
    ports:
      - "80:80" # Exposed through Nginx reverse proxy
    env_file:
      - ./frontend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://neondb_owner:npg_BPaT1IF0mdor@ep-withered-frost-aqctzr1z-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_AI_URL=http://localhost/ai
      - NEXT_PUBLIC_UTILS_URL=http://localhost/utils
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nest-api:
        condition: service_started
      fastapi-ai:
        condition: service_healthy
      node-services:
        condition: service_started
    networks:
      - jansankalp-net

  # ─── 2. NestJS API Gateway & Controller ─────────────────────────────────────
  nest-api:
    build:
      context: ./backend/nest-api
      dockerfile: Dockerfile
    container_name: jansankalp-nest-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://neondb_owner:npg_BPaT1IF0mdor@ep-withered-frost-aqctzr1z-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-jansankalp-internal-secret-service-token-2026}
      - JWT_SECRET=${AUTH_SECRET:-jansankalp-jwt-secret-key-2026-production}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jansankalp-net

  # ─── 3. FastAPI Python AI/ML Engine ────────────────────────────────────────
  fastapi-ai:
    build:
      context: ./backend/fastapi-ai
      dockerfile: Dockerfile
    container_name: jansankalp-fastapi-ai
    restart: unless-stopped
    environment:
      - PORT=10000
      - DATABASE_URL=${DATABASE_URL:-postgresql://neondb_owner:npg_BPaT1IF0mdor@ep-withered-frost-aqctzr1z-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-jansankalp-internal-secret-service-token-2026}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - ASSEMBLY_AI_API_KEY=${ASSEMBLY_AI_API_KEY}
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/fastapi-ai/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jansankalp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── 4. Express Node Services (Payments, Emails, Uploads) ───────────────────
  node-services:
    build:
      context: ./backend/node-services
      dockerfile: Dockerfile
    container_name: jansankalp-node-services
    restart: unless-stopped
    environment:
      - PORT=3001
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-jansankalp-internal-secret-service-token-2026}
      - NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY=${NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT=${NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    networks:
      - jansankalp-net

  # ─── Infrastructure: PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: jansankalp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=jansankalp
      - POSTGRES_PASSWORD=jansankalp_pass
      - POSTGRES_DB=jansankalp
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jansankalp -d jansankalp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jansankalp-net

  # ─── Infrastructure: Redis Cache & BullMQ Queue ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jansankalp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jansankalp-net

  # ─── Nginx Reverse Proxy Gateway ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: jansankalp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - nest-api
      - fastapi-ai
      - node-services
    networks:
      - jansankalp-net

  # ─── Prometheus Monitoring ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: jansankalp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - jansankalp-net
    profiles:
      - monitoring

  # ─── Grafana Dashboard ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: jansankalp-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=jansankalp123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - jansankalp-net
    profiles:
      - monitoring

networks:
  jansankalp-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
