version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# DEVELOPMENT DOCKER COMPOSE - Complete JanSankalp AI 4-Tier Stack with Hot-Reload
# Run with: docker compose -f docker-compose.dev.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── 1. Next.js Frontend (Dev Mode) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: jansankalp-frontend-dev
    restart: unless-stopped
    ports:
      - "3003:3000" # Bind to a dedicated dev port directly if bypassed, or via Nginx
    env_file:
      - ./frontend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://neondb_owner:npg_BPaT1IF0mdor@ep-withered-frost-aqctzr1z-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_AI_URL=http://localhost/ai
      - NEXT_PUBLIC_UTILS_URL=http://localhost/utils
      - NEST_API_INTERNAL_URL=http://nest-api:3000
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jansankalp-dev-net

  # ─── 2. NestJS API Gateway (Dev Mode) ───────────────────────────────────────
  nest-api:
    build:
      context: ./backend/nest-api
      dockerfile: Dockerfile.dev
    container_name: jansankalp-nest-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/nest-api/.env
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://neondb_owner:npg_BPaT1IF0mdor@ep-withered-frost-aqctzr1z-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017/jansankalp
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-jansankalp-internal-secret-service-token-2026}
      - JWT_SECRET=${AUTH_SECRET:-jansankalp-jwt-secret-key-2026-production}
      - AUTH_SECRET=${AUTH_SECRET:-I/9TpoQCI36gforZOYZ2MsOS7MjqWMdPwTBJW1WWQpg=}
      - NODE_ENV=development
      - AI_SERVICE_URL=http://fastapi-ai:10000
      - NODE_SERVICES_URL=http://node-services:3001
    volumes:
      - ./backend/nest-api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jansankalp-dev-net

  # ─── 3. FastAPI AI Engine (Dev Mode) ────────────────────────────────────────
  fastapi-ai:
    build:
      context: ./backend/fastapi-ai
      dockerfile: Dockerfile.dev
    container_name: jansankalp-fastapi-ai-dev
    restart: unless-stopped
    ports:
      - "10000:10000"
    env_file:
      - ./backend/fastapi-ai/.env
    environment:
      - PORT=10000
      - DATABASE_URL=${DATABASE_URL:-postgresql://neondb_owner:npg_BPaT1IF0mdor@ep-withered-frost-aqctzr1z-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-jansankalp-internal-secret-service-token-2026}
      - NODE_ENV=development
    volumes:
      - ./backend/fastapi-ai:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jansankalp-dev-net

  # ─── 4. Express Node Services (Dev Mode) ────────────────────────────────────
  node-services:
    build:
      context: ./backend/node-services
      dockerfile: Dockerfile.dev
    container_name: jansankalp-node-services-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/node-services/.env
    environment:
      - PORT=3001
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-jansankalp-internal-secret-service-token-2026}
      - NEST_API_INTERNAL_URL=http://nest-api:3000
    volumes:
      - ./backend/node-services:/app
      - /app/node_modules
    networks:
      - jansankalp-dev-net

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: jansankalp-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=jansankalp_pass
      - POSTGRES_DB=jansankalp
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d jansankalp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jansankalp-dev-net

  # ─── Redis Cache & BullMQ Queue ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jansankalp-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jansankalp-dev-net

  # ─── Infrastructure: MongoDB (AI Logs, Threats, Audits) ────────────────────
  mongodb:
    image: mongo:6-jammy
    container_name: jansankalp-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-dev-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jansankalp-dev-net

  # ─── Nginx Reverse Proxy Gateway ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: jansankalp-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - nest-api
      - fastapi-ai
      - node-services
    networks:
      - jansankalp-dev-net

networks:
  jansankalp-dev-net:
    driver: bridge

volumes:
  postgres-dev-data:
  mongodb-dev-data:
